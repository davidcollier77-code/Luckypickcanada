<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 1184" role="img" aria-labelledby="title desc">
  <title id="title">Premium gold LuckyPickCanada mystery card back</title>
  <desc id="desc">A crisp polished gold collectible card deck back with maple clover branding and sharp foil details.</desc>

  <defs>
